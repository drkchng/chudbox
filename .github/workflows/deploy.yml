# CI/CD → Cloudflare. On every push to master: install, typecheck, lint, unit
# tests, build the SPA, then apply pending D1 migrations and deploy the Worker
# (which serves the SPA from apps/web/dist via the assets binding).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with Workers Scripts:Edit, D1:Edit,
#                           Workers R2 Storage:Edit on the account.
#   CLOUDFLARE_ACCOUNT_ID — the Cloudflare account id (dash → Workers overview).
name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pinned pnpm version from package.json's packageManager field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

      - run: pnpm build

      - name: Apply D1 migrations
        working-directory: apps/api
        run: pnpm exec wrangler d1 migrations apply chudbox --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        working-directory: apps/api
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
