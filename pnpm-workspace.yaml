packages:
  - 'apps/*'
  - 'packages/*'

# Native-binary packages that need their install scripts to run.
# esbuild: vite, tsup, vitest. workerd: wrangler's local runtime.
# sharp: image processing, pulled in via wrangler.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - '@better-auth/core@1.6.18'
  - '@better-auth/drizzle-adapter@1.6.18'
  - '@better-auth/kysely-adapter@1.6.18'
  - '@better-auth/memory-adapter@1.6.18'
  - '@better-auth/mongo-adapter@1.6.18'
  - '@better-auth/prisma-adapter@1.6.18'
  - '@better-auth/telemetry@1.6.18'
  - better-auth@1.6.18
